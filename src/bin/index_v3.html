<!DOCTYPE html>
<html>
<head>
    <title>Physis Global Dashboard v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #main-container { display: flex; width: 100%; height: 100%; }
        #cy { flex: 2; border-right: 1px solid #00ff41; background: #000; }
        #sidebar { flex: 1; display: flex; flex-direction: column; background: #000; }
        .tabs { display: flex; border-bottom: 1px solid #00ff41; }
        .tab { padding: 10px; cursor: pointer; border-right: 1px solid #00ff41; }
        .tab.active { background: #00ff41; color: #000; }
        .panel { flex: 1; display: none; flex-direction: column; overflow: hidden; }
        .panel.active { display: flex; }
        .sub-panel { flex: 1; border-bottom: 1px solid #004400; overflow-y: auto; padding: 10px; }
        h3 { margin: 0 0 5px 0; font-size: 12px; color: #00ff41; opacity: 0.7; }
        p { margin: 3px 0; font-size: 11px; line-height: 1.2; border-left: 1px solid #004400; padding-left: 5px; }
        input, select { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 5px; margin: 5px 0; width: 100%; }
        button { background: #00ff41; color: #000; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .dream { color: #00ffff; }
    </style>
</head>
<body>
    <div id="main-container">
        <div id="cy"></div>
        <div id="sidebar">
            <div class="tabs">
                <div class="tab active" onclick="showTab('dashboard')">DASHBOARD</div>
                <div class="tab" onclick="showTab('settings')">SETTINGS</div>
            </div>
            
            <div id="dashboard" class="panel active">
                <div class="sub-panel" id="transcript">
                    <h3>TRANSCRIPT</h3>
                    <div id="transcript-content"></div>
                </div>
                <div class="sub-panel" id="dreams">
                    <h3>DREAMS</h3>
                    <div id="dreams-content"></div>
                </div>
                <div class="sub-panel" id="entities">
                    <h3>ONTOLOGY NODES</h3>
                    <div id="entities-content"></div>
                </div>
            </div>

            <div id="settings" class="panel">
                <div class="sub-panel">
                    <h3>ENGINE SETTINGS</h3>
                    <label>Recording Interval (seconds)</label>
                    <input type="number" id="set-record-secs" value="15">
                    
                    <label>Transcription Model</label>
                    <select id="set-trans-model">
                        <option value="whisper-large-v3">whisper-large-v3 (Cloud)</option>
                        <option value="whisper-large-v3-turbo">whisper-large-v3-turbo (Cloud)</option>
                    </select>

                    <label>Extraction Model</label>
                    <select id="set-ext-model">
                        <option value="llama3.2">llama3.2 (Local)</option>
                        <option value="deepseek-chat">deepseek-chat (DeepSeek Cloud)</option>
                        <option value="openrouter">OpenRouter (Default: DeepSeek Chat)</option>
                        <option value="gpt-4o-mini">gpt-4o-mini (OpenAI Cloud)</option>
                    </select>

                    <label>
                        <input type="checkbox" id="set-show-dreams" checked style="width:auto"> Enable Dream Engine
                    </label>

                    <button onclick="saveSettings()">APPLY CONFIGURATION</button>
                    <div id="settings-status" style="margin-top:10px; font-size:10px"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
                { selector: 'node', style: { 'background-color': '#00ff41', 'label': 'data(name)', 'color': '#00ff41', 'font-family': 'monospace', 'font-size': '10px' } },
                { selector: 'edge', style: { 'width': 1, 'line-color': '#004400', 'target-arrow-color': '#004400', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(predicate)', 'font-size': '8px', 'color': '#00ff41' } }
            ],
            layout: { name: 'cose' }
        });

        let lastNodeCount = 0;
        let lastEdgeCount = 0;

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        async function saveSettings() {
            const settings = {
                record_secs: parseInt(document.getElementById('set-record-secs').value),
                transcription_model: document.getElementById('set-trans-model').value,
                extraction_model: document.getElementById('set-ext-model').value,
                show_dreams: document.getElementById('set-show-dreams').checked
            };
            const resp = await fetch('/api/settings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(settings)
            });
            if (resp.ok) {
                document.getElementById('settings-status').innerText = "SYSTEM RECONFIGURED: OK";
                setTimeout(() => document.getElementById('settings-status').innerText = "", 3000);
            }
        }

        async function update() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                document.getElementById('transcript-content').innerHTML = data.transcripts.slice(-20).map(t => `<p>> ${t}</p>`).join('');
                document.getElementById('dreams-content').innerHTML = data.dreams.slice(-10).map(d => `<p class="dream">? ${d}</p>`).join('');
                
                const nodeIds = Object.keys(data.map.entities);
                document.getElementById('entities-content').innerHTML = nodeIds.map(id => `<p># ${data.map.entities[id].name}</p>`).join('');

                if (nodeIds.length !== lastNodeCount || data.map.relationships.length !== lastEdgeCount) {
                    const elements = nodeIds.map(id => ({ data: { id: id, name: data.map.entities[id].name } }));
                    data.map.relationships.forEach((rel, i) => {
                        elements.push({ data: { id: 'e'+i, source: rel.source, target: rel.target, predicate: rel.predicate } });
                    });
                    cy.json({ elements: elements });
                    cy.layout({ name: 'cose', animate: false }).run();
                    lastNodeCount = nodeIds.length;
                    lastEdgeCount = data.map.relationships.length;
                }
            } catch (e) { console.error(e); }
        }

        setInterval(update, 2000);
        update();
    </script>
</body>
</html>
