<!DOCTYPE html>
<html>
<head>
    <title>Physis Global Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; margin: 0; display: flex; height: 100vh; }
        #cy { flex: 2; border-right: 1px solid #00ff41; }
        #sidebar { flex: 1; display: flex; flex-direction: column; background: #000; }
        .panel { flex: 1; border-bottom: 1px solid #00ff41; overflow-y: auto; padding: 10px; }
        h3 { margin: 0 0 10px 0; background: #00ff41; color: #000; padding: 2px 5px; font-size: 14px; }
        p { margin: 5px 0; font-size: 12px; line-height: 1.4; border-left: 2px solid #00ff41; padding-left: 5px; }
        .dream { color: #00ffff; border-left-color: #00ffff; }
        a { color: #ff00ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div id="sidebar">
        <div class="panel" id="transcript">
            <h3>LOG: TRANSCRIPT</h3>
            <div id="transcript-content"></div>
        </div>
        <div class="panel" id="dreams">
            <h3>LOG: DREAMS (SPECULATION)</h3>
            <div id="dreams-content"></div>
        </div>
        <div class="panel" id="entities">
            <h3>LOG: ONTOLOGY NODES</h3>
            <div id="entities-content"></div>
        </div>
    </div>

    <script>
        var cy = cytoscape({
            container: document.getElementById('cy'),
            style: [
                {
                    selector: 'node',
                    style: {
                        'background-color': '#00ff41',
                        'label': 'data(name)',
                        'color': '#00ff41',
                        'font-family': 'monospace',
                        'font-size': '10px',
                        'text-outline-width': 1,
                        'text-outline-color': '#000'
                    }
                },
                {
                    selector: 'edge',
                    style: {
                        'width': 2,
                        'line-color': '#004400',
                        'target-arrow-color': '#004400',
                        'target-arrow-shape': 'triangle',
                        'curve-style': 'bezier',
                        'label': 'data(predicate)',
                        'font-size': '8px',
                        'color': '#00ff41'
                    }
                }
            ],
            layout: { name: 'cose' }
        });

        async function update() {
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                document.getElementById('transcript-content').innerHTML = data.transcripts.map(t => `<p>> ${t}</p>`).join('');
                document.getElementById('dreams-content').innerHTML = data.dreams.map(d => `<p class="dream">? ${d}</p>`).join('');
                
                const uniqueEntities = [...new Set(data.entities)];
                document.getElementById('entities-content').innerHTML = uniqueEntities.map(e => `<p><a href="#">#${e}</a></p>`).join('');

                const elements = uniqueEntities.map(e => ({ data: { id: e, name: e } }));
                data.relationships.forEach((rel, i) => {
                    elements.push({ data: { id: 'e'+i, source: rel[0], target: rel[2], predicate: rel[1] } });
                });

                cy.json({ elements: elements });
                if (elements.length > 0) {
                    cy.layout({ name: 'cose', animate: false }).run();
                }
            } catch (e) { console.error(e); }
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
